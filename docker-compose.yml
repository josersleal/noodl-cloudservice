services:
  # 1. Database
  mongodb:
    image: mongo:latest
    container_name: nutrisniff-mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - nutrisniff-network

  # 2. Parse Server (The Engine)
  cloudservice:
    build:
      context: .
    container_name: nutrisniff-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - PORT=3000
      - APP_ID=nutrisniff_dev
      - MASTER_KEY=master_key_secure_123
      # Use the internal Docker name for the DB connection
      - DATABASE_URI=mongodb://admin:password123@nutrisniff-mongodb:27017/noodl?authSource=admin
      # Explicitly set the mount path
      - PARSE_MOUNT=/parse
      # Enable health check
      - PARSE_SERVER_ALLOW_PUBLIC_HEALTH_CHECK=true
    ports:
      - "3000:3000"
    networks:
      - nutrisniff-network

  # 3. Parse Dashboard
  parse-dashboard:
    image: parseplatform/parse-dashboard
    container_name: nutrisniff-dashboard
    restart: always
    environment:
      - PARSE_DASHBOARD_ALLOW_INSECURE_HTTP=1
    ports:
      - "4040:4040"
    volumes:
      # Mount the config file created in Step 1
      - ./dashboard-config.json:/src/Parse-Dashboard/parse-dashboard-config.json
    networks:
      - nutrisniff-network

networks:
  nutrisniff-network:
    driver: bridge

volumes:
  mongodb_data: